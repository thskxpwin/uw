<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>USAFA Chapel Visitor Log</title>
  <style>
    :root { --max: 980px; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f6f7f9; color: #111; }
    header { padding: 28px 16px 10px; text-align: center; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0; color: #444; }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 16px; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.08); overflow: hidden; }
    .hero {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      background: #e9ecf2;
    }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #d7dbe4;
      background: #ffffff;
      color: #111;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      min-height: 54px;
    }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: #0b5fff; border-color: #0b5fff; color: #fff; }
    .btn.secondary { background: #f3f5f9; }
    .note { padding: 0 16px 18px; color: #555; font-size: 13px; }
    footer { text-align: center; padding: 18px 16px 28px; color: #666; font-size: 12px; }
    @media (max-width: 720px) { .actions { grid-template-columns: 1fr; } .hero { height: 220px; } }
  </style>
</head>
<body>
  <header>
    <h1>USAFA Chapel Visitor Log</h1>
    <p>Visitors: submit your waiver. Staff: request an updated waiver list.</p>
  </header>

  <div class="wrap">
    <div class="card">
      <!-- Put an image named "chapel.jpg" in the same folder as this index.html (or change the filename here). -->
      <img class="hero" src="https://www.usafa.edu/app/uploads/49628307012_525e80a10c_o.jpg" alt="USAFA Chapel" />

      <div class="actions">
        <!-- Visitors button -->
        <a class="btn primary" href="staticf.html?k=chapel">
          Visitor Waiver Form
        </a>

        <!-- Staff button (NO email client; submits via StaticForms) -->
        <button class="btn secondary" id="staffBtn" type="button">
          Staff: Request Waivers List
        </button>
      </div>

      <div class="note">
        Tip: If you’re on a shared kiosk/tablet, visitors should use the Visitor Waiver Form.
      </div>
    </div>
  </div>

  <footer>
    © USAFA Chapel
  </footer>

  <script>
    // StaticForms config
    // 1) Replace with your StaticForms access key.
    // 2) Make sure StaticForms is configured to deliver to your USAF inbox for the "staff request" emails.
    const STATICFORMS_ACCESS_KEY = "PASTE_YOUR_STATICFORMS_ACCESS_KEY_HERE";

    // Email subject that your separate Power Automate flow will watch for
    const STAFF_SUBJECT = "Updated waivers list request";

    // Optional: add a token so you can filter these in email/flows if you want later
    const STAFF_TOKEN = "staff_waivers_export_request";

    async function requestWaiversList() {
      const ok = confirm("Send request for an updated waivers list?");
      if (!ok) return;

      // Basic guard if you forgot to paste the key
      if (!STATICFORMS_ACCESS_KEY || STATICFORMS_ACCESS_KEY.includes("PASTE_YOUR_STATICFORMS_ACCESS_KEY_HERE")) {
        alert("StaticForms access key is not set in index.html yet.");
        return;
      }

      try {
        const res = await fetch("https://api.staticforms.xyz/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            accessKey: STATICFORMS_ACCESS_KEY,
            subject: STAFF_SUBJECT,
            // These fields become the email body content you’ll parse in Power Automate
            message: "Staff requested an updated waivers list.",
            token: STAFF_TOKEN,
            requested_at_utc: new Date().toISOString()
          })
        });

        if (res.ok) {
          alert("Request sent successfully.");
        } else {
          // StaticForms sometimes returns JSON; keep it simple for now
          alert("Request failed to send. Please try again or contact staff.");
        }
      } catch (e) {
        alert("Network error while sending request. Please try again.");
      }
    }

    document.getElementById("staffBtn").addEventListener("click", requestWaiversList);
  </script>
</body>
</html>
