<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>USAFA Chapel Visitor Log</title>
  <style>
    :root { --max: 980px; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f6f7f9; color: #111; }
    header { padding: 28px 16px 10px; text-align: center; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0; color: #444; }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 16px; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.08); overflow: hidden; }
    .hero {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      background: #e9ecf2;
    }

    /* Center the single visitor button */
    .actions { display: flex; justify-content: center; padding: 16px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #d7dbe4;
      background: #ffffff;
      color: #111;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      min-height: 54px;
    }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: #0b5fff; border-color: #0b5fff; color: #fff; }

    .note { padding: 0 16px 18px; color: #555; font-size: 13px; }

    /* Less prominent staff area */
    .staff-area {
      max-width: var(--max);
      margin: 0 auto;
      padding: 6px 16px 0;
      text-align: center;
    }
    .staff-link {
      background: transparent;
      border: none;
      color: #666;
      font-size: 12px;
      text-decoration: underline;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 8px;
    }
    .staff-link:hover { color: #111; }

    footer { text-align: center; padding: 14px 16px 28px; color: #666; font-size: 12px; }

    @media (max-width: 720px) { .hero { height: 220px; } }
  </style>
</head>
<body>
  <header>
    <h1>USAFA Chapel Visitor Log</h1>
    <p>Visitors: Click the blue button to load the waiver.</p>
  </header>

  <div class="wrap">
    <div class="card">
      <img class="hero" src="https://www.usafa.edu/app/uploads/49628307012_525e80a10c_o.jpg" alt="USAFA Chapel" />

      <div class="actions">
        <a class="btn primary" href="staticf.html?k=chapel">
          Visitor Waiver Form
        </a>
      </div>

      <div class="note">
        Tip: If you’re on a shared kiosk/tablet, visitors should use the Visitor Waiver Form.
      </div>
    </div>
  </div>

  <!-- Staff button moved down and made less prominent -->
  <div class="staff-area">
    <button class="staff-link" id="staffBtn" type="button">
      Staff: Request Waivers List
    </button>
  </div>

  <footer>
    © USAFA Chapel
  </footer>

  <script>
    const STATICFORMS_ACCESS_KEY = "sf_k5g50e4e96a6a56gnah9jhfm";
    const STAFF_SUBJECT = "Staff Waiver Request 123";
    const STAFF_TOKEN = "staff_waivers_export_request";

    async function requestWaiversList() {
      const ok = confirm("Send request for an updated waivers list?");
      if (!ok) return;

      if (!STATICFORMS_ACCESS_KEY || STATICFORMS_ACCESS_KEY.includes("PASTE_YOUR_STATICFORMS_ACCESS_KEY_HERE")) {
        alert("StaticForms access key is not set in index.html yet.");
        return;
      }

      try {
        const res = await fetch("https://api.staticforms.xyz/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            accessKey: STATICFORMS_ACCESS_KEY,
            subject: STAFF_SUBJECT,
            message: "Staff requested an updated waivers list.",
            token: STAFF_TOKEN,
            requested_at_utc: new Date().toISOString()
          })
        });

        if (res.ok) {
          alert("Request sent successfully.");
        } else {
          alert("Request failed to send. Please try again or contact staff.");
        }
      } catch (e) {
        alert("Network error while sending request. Please try again.");
      }
    }

    document.getElementById("staffBtn").addEventListener("click", requestWaiversList);
  </script>
</body>
</html>
